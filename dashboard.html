<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Watchdog AI Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-dark text-light">
<div class="container py-4">
  <h2 class="text-center mb-4">🛡️ Watchdog AI – Live Defense Dashboard</h2>
  <table class="table table-dark table-striped align-middle" id="logTable">
    <thead>
      <tr>
        <th>ID</th><th>Timestamp</th><th>Action Type</th><th>Content</th><th>Risk</th><th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
async function fetchData() {
  const res = await fetch('/data');
  const data = await res.json();
  const tbody = document.querySelector('#logTable tbody');
  tbody.innerHTML = '';
  data.slice().reverse().forEach(row => {
    let cls = '';
    if (row.decision === 'ESCALATE') cls = 'table-danger';
    else if (row.decision === 'ALERT') cls = 'table-warning';
    else cls = 'table-success';
    tbody.innerHTML += `
      <tr class="${cls}">
        <td>${row.id}</td>
        <td>${row.timestamp}</td>
        <td>${row.action_type}</td>
        <td>${row.content}</td>
        <td>${row.score}</td>
        <td>${row.decision}</td>
      </tr>`;
  });
}
setInterval(fetchData, 3000);
fetchData();
</script>
</body>
</html>
